name: Merge Gate

on:
  pull_request:
    branches:
      - main
  # Run the same gate when GitHub's merge queue forms a merge group, so the
  # "Merge Gate" required check reports a status for queued PRs. Without this,
  # a merge-queue-required check would never run and PRs would be stuck.
  # https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/configuring-pull-request-merges/managing-a-merge-queue#triggering-merge-group-checks-with-github-actions
  merge_group:

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.check.outputs.lint }}
      test: ${{ steps.check.outputs.test }}
      pi_skills: ${{ steps.check.outputs.pi_skills }}
      openapi: ${{ steps.check.outputs.openapi }}
      api_client: ${{ steps.check.outputs.api_client }}
      docker: ${{ steps.check.outputs.docker }}
      ui: ${{ steps.check.outputs.ui }}
      templates_workflows: ${{ steps.check.outputs.templates_workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine base for diff
        id: base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            # merge_group events have no github.base_ref; diff against the
            # merge group's base SHA (already reachable via fetch-depth: 0).
            echo "ref=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
          else
            git fetch origin "${{ github.base_ref }}"
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute per-domain change flags
        id: check
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only ${{ steps.base.outputs.ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          # Always re-run everything if the merge-gate workflow itself changed.
          GATE_CHANGED=$(echo "$CHANGED" | grep -E '^\.github/workflows/merge-gate\.yml$' || true)

          match() {
            local pattern="$1"
            if [ -n "$GATE_CHANGED" ]; then
              echo "true"; return
            fi
            if echo "$CHANGED" | grep -E "$pattern" > /dev/null; then
              echo "true"
            else
              echo "false"
            fi
          }

          # lint + tsc:check: biome runs on src/ + packages/ + apps/, tsc covers src/packages (app packages excluded in tsconfig).
          LINT=$(match '^(src/|packages/|apps/|package\.json$|bun\.lock|tsconfig\.json$|biome\.json$)')

          # tests: src/ + scripts that tests import + lockfile/tsconfig.
          TEST=$(match '^(src/|packages/|apps/|scripts/|package\.json$|bun\.lock|tsconfig\.json$)')

          # pi-skills freshness: generator inputs + outputs.
          PI_SKILLS=$(match '^(plugin/commands/|plugin/pi-skills/|plugin/build-pi-skills\.ts$)')

          # openapi freshness: routes, types, generator, version, generated artifacts.
          OPENAPI=$(match '^(packages/api-server/src/(http|tools)/|packages/types/|scripts/generate-openapi\.ts$|openapi\.json$|docs-site/content/docs/api-reference/|package\.json$)')

          # api-client freshness: generated from openapi.json after route/type/generator changes.
          API_CLIENT=$(match '^(packages/api-server/src/(http|tools)/|packages/types/|packages/api-client/|scripts/generate-api-client\.ts$|scripts/generate-openapi\.ts$|openapi\.json$|package\.json$)')

          # docker build test: mirrors docker-and-deploy.yml paths.
          DOCKER=$(match '^(src/|packages/|apps/|Dockerfile$|Dockerfile\.worker$|docker-entrypoint\.sh$|api-entrypoint\.sh$|package\.json$|bun\.lock|tsconfig\.json$|scripts/|plugin/|deploy/)')

          # ui app lint + typecheck.
          UI=$(match '^apps/ui/')

          # workflow template validation: content.md changes in packages/swarm-templates/src/workflows/.
          TEMPLATES_WORKFLOWS=$(match '^(packages/swarm-templates/src/workflows/|scripts/validate-template-workflows\.ts$|src/workflows/definition\.ts$|packages/types/)')

          for k in LINT TEST PI_SKILLS OPENAPI API_CLIENT DOCKER UI TEMPLATES_WORKFLOWS; do
            v=$(eval echo \$$k)
            key=$(echo "$k" | tr '[:upper:]' '[:lower:]')
            echo "${key}=${v}" >> $GITHUB_OUTPUT
            echo "${key}=${v}"
          done

  lint-and-typecheck:
    name: Lint and Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.lint == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome linter
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run tsc:check

      - name: Install evals dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/evals

      - name: Type check evals
        run: bun run tsc:check
        working-directory: apps/evals

      - name: Test evals
        # evals is its own bun package; these are pure unit tests (scoring,
        # registry, normalize, scenario structure) — no E2B/network, ~0.5s.
        run: bun test
        working-directory: apps/evals

      - name: Build evals UI
        run: bun run ui:build
        working-directory: apps/evals

      - name: Check worker/API DB boundary
        run: bash scripts/check-db-boundary.sh

      - name: Check dependency graph boundaries
        run: bun run check:dep-boundary

      - name: Check API_KEY env-access boundary
        run: bash scripts/check-api-key-boundary.sh

      - name: Check DB audit columns
        run: bash scripts/check-audit-columns.sh

      - name: Check SDK tool registration
        run: bun scripts/check-sdk-tool-registration.ts

  test:
    name: Run Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.test == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        # apps/evals/ is excluded from the root run via bunfig.toml pathIgnorePatterns
        # (it's a separate bun package with its own deps + its own CI test step in
        # the lint-and-typecheck job).
        run: bun test

  pi-skills-freshness:
    name: Pi-Skills Freshness Check
    needs: detect-changes
    if: needs.detect-changes.outputs.pi_skills == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild pi-skills and check for drift
        run: |
          bun run build:pi-skills
          if [ -n "$(git diff --name-only plugin/pi-skills/)" ]; then
            echo "::error::pi-skills are out of date! Run 'bun run build:pi-skills' and commit the changes."
            git diff --stat plugin/pi-skills/
            exit 1
          fi
          echo "pi-skills are up to date."

  openapi-freshness:
    name: OpenAPI Spec Freshness Check
    needs: detect-changes
    if: needs.detect-changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Rebuild OpenAPI spec and check for drift
        run: |
          bun run docs:openapi
          if [ -n "$(git diff --name-only openapi.json)" ]; then
            echo "::error::openapi.json is out of date! Run 'bun run docs:openapi' and commit the changes."
            git diff --stat openapi.json
            exit 1
          fi
          echo "OpenAPI spec is up to date."
      - name: Check generated API docs for drift
        run: |
          if [ -n "$(git diff --name-only docs-site/content/docs/api-reference/)" ]; then
            echo "::error::API reference docs are out of date! Run 'bun run docs:openapi' and commit the changes."
            git diff --stat docs-site/content/docs/api-reference/
            exit 1
          fi
          echo "API reference docs are up to date."
      - name: Check for raw matchRoute usage
        run: |
          UNREGISTERED=$(grep -rn "matchRoute(" packages/api-server/src/http/ --include="*.ts" | grep -v "route-def.ts" | grep -v "utils.ts" || true)
          if [ -n "$UNREGISTERED" ]; then
            echo "::error::Found raw matchRoute() calls. Convert to route() definitions:"
            echo "$UNREGISTERED"
            exit 1
          fi
          echo "No raw matchRoute() calls found."

  api-client-freshness:
    name: API Client Freshness Check
    needs: detect-changes
    if: needs.detect-changes.outputs.api_client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Rebuild generated API client and check for drift
        run: |
          bun run docs:openapi
          bun run generate:api-client
          if [ -n "$(git diff --name-only packages/api-client/src/)" ]; then
            echo "::error::Generated API client is out of date! Run 'bun run docs:openapi && bun run generate:api-client' and commit the changes."
            git diff --stat packages/api-client/src/
            exit 1
          fi
          echo "Generated API client is up to date."

  docker-build:
    name: Docker Build Test
    needs: detect-changes
    if: needs.detect-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.worker]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: test-image:latest

  ui-lint:
    name: UI Lint and Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.ui == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check design tokens (no raw color literals)
        run: bun run check:tokens
        working-directory: apps/ui

      - name: Run Biome linter
        run: bun run lint
        working-directory: apps/ui

      - name: Run TypeScript type check
        run: bunx tsc -b
        working-directory: apps/ui

  template-workflow-validation:
    name: Validate Workflow Templates
    needs: detect-changes
    if: needs.detect-changes.outputs.templates_workflows == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workflow templates
        run: bun run scripts/validate-template-workflows.ts

  gate:
    name: Merge Gate
    needs: [detect-changes, lint-and-typecheck, test, pi-skills-freshness, openapi-freshness, api-client-freshness, docker-build, ui-lint, template-workflow-validation]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | jq -e 'map(select(. != "success" and . != "skipped")) | length > 0' > /dev/null 2>&1; then
            echo "::error::Some required jobs failed!"
            exit 1
          fi
          echo "All jobs passed or were skipped."
